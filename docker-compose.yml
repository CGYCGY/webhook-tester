services:
  app:
    build: .
    ports:
      - "8090:8090"
    volumes:
      - app-data:/data
    environment:
      - PORT=8090
      - DATA_DIR=/data
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=changeme123
      - JWT_SECRET=change-this-secret-in-production
    restart: unless-stopped

volumes:
  app-data:
