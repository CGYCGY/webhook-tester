<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="cyan-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0f172a"/>

  <!-- Subtle grid lines for techy feel -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- Hook shape — a curved hook representing "webhook" -->
  <g filter="url(#cyan-glow)">
    <!-- Main hook path: vertical line curving into a hook -->
    <path
      d="M 200 120 L 200 300 Q 200 370 256 370 Q 312 370 312 300 L 312 260"
      stroke="url(#glow)"
      stroke-width="32"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- Arrow head on the hook end pointing up -->
    <path
      d="M 272 290 L 312 240 L 352 290"
      stroke="url(#glow)"
      stroke-width="32"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- Incoming signal dots — three pulsing dots on the left -->
  <circle cx="120" cy="160" r="12" fill="#22d3ee" opacity="0.3"/>
  <circle cx="120" cy="160" r="7" fill="#22d3ee" opacity="0.7"/>

  <circle cx="100" cy="230" r="12" fill="#22d3ee" opacity="0.2"/>
  <circle cx="100" cy="230" r="7" fill="#22d3ee" opacity="0.5"/>

  <circle cx="120" cy="300" r="12" fill="#22d3ee" opacity="0.2"/>
  <circle cx="120" cy="300" r="7" fill="#22d3ee" opacity="0.5"/>

  <!-- Small arrows from dots to hook -->
  <g stroke="#22d3ee" stroke-width="3" stroke-linecap="round" opacity="0.4">
    <line x1="137" y1="160" x2="175" y2="160"/>
    <line x1="117" y1="230" x2="175" y2="230"/>
    <line x1="137" y1="300" x2="175" y2="300"/>
  </g>

  <!-- "wht" monospace text mark at bottom -->
  <text x="256" y="440" text-anchor="middle"
    font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace"
    font-size="42" font-weight="700" letter-spacing="12"
    fill="#94a3b8">WHT</text>
</svg>
